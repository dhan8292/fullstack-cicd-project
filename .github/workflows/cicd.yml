name: Full Stack CI/CD

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t dhanu92/backend ./backend

      - name: Push Backend
        run: |
          docker push dhanu92/backend

      - name: Build Frontend Image
        run: |
          docker build -t dhanu92/frontend ./frontend

      - name: Push Frontend
        run: |
          docker push dhanu92/frontend
